# Grype configuration for CascadeGuard image scanning
# https://github.com/anchore/grype

# Output format for CI integration
output: "table"

# NOTE: fail-on-severity is intentionally absent from this shared config.
# Policy enforcement (whether to fail a build) belongs in the workflow step
# that uses this config, not here.  The release workflow passes --fail-on critical
# explicitly; the build workflow evaluates counts after the scan completes so
# that SBOM generation and structure tests still run even when violations exist.

# Scope of the scan — all layers (not just the squashed image)
scope: "all-layers"

# Database configuration
db:
  auto-update: true
  # Maximum acceptable age for the vulnerability database
  max-allowed-built-age: "120h"

# Match configuration
match:
  java:
    using-cpes: true
  python:
    using-cpes: true
  javascript:
    using-cpes: true
  golang:
    using-cpes: true
    always-use-cpe-for-stdlib: true
  stock:
    using-cpes: true

# Ignore rules — known false positives or accepted risks
# Each entry must reference a tracking issue for audit trail
ignore:
  # Example: kernel headers present in build stage but not in final image
  # - vulnerability: "CVE-YYYY-XXXXX"
  #   package:
  #     name: "linux-libc-dev"
  #     type: "deb"
  #   reason: "Build-stage only; not present in final image. Ref: CAS-XXX"

  # Disputed CVEs with no known exploit path in our configuration
  # Add entries here as they are reviewed and approved by the security team

  # ── redis:7.4-alpine — Go stdlib CVEs in gosu (CAS-472/CAS-473) ─────────────
  #
  # redis:7.4-alpine bundles gosu compiled with Go stdlib go1.18.2 (Alpine
  # rebuilds pending Go 1.24+).  8 Critical CVEs are in this old Go stdlib;
  # none are exploitable via gosu's privilege-drop-only role.  gosu does not
  # serve HTTP, render templates, run cgo at runtime, or exec `go env`.
  # Exceptions are scoped to stdlib go1.18.2 to avoid suppressing newer CVEs.
  #
  # gosu also appears in postgres:16 (same CVEs, same version).
  # CAS-473 (PR#62) tracks the long-term fix (Alpine rebuild with Go 1.24+).
  # Ref: CAS-472, CAS-473.

  # CVE-2023-24531: `go env` does not sanitize environment output.
  # gosu never calls `go env`; not exploitable.
  - vulnerability: "CVE-2023-24531"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "go env only; gosu does not call go env at runtime. Waiting on Alpine redis rebuild with Go 1.24+. Ref: CAS-472"

  # CVE-2023-24538: html/template backtick handling.
  # Redis does not render HTML templates.
  - vulnerability: "CVE-2023-24538"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "html/template backtick; Redis does not render templates. Waiting on Alpine redis rebuild with Go 1.24+. Ref: CAS-472"

  # CVE-2023-24540: html/template JS whitespace handling.
  # Redis does not render HTML templates.
  - vulnerability: "CVE-2023-24540"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "html/template JS whitespace; Redis does not render templates. Waiting on Alpine redis rebuild with Go 1.24+. Ref: CAS-472"

  # CVE-2023-29402 / CVE-2023-29404 / CVE-2023-29405: cgo code-gen attacks
  # (arbitrary code at build time via `go get`).  gosu is pre-compiled; no
  # cgo build step executes in the running container.
  - vulnerability: "CVE-2023-29402"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "cgo build-time attack; gosu is pre-compiled, no go build runs in container. Ref: CAS-472"

  - vulnerability: "CVE-2023-29404"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "cgo build-time attack; gosu is pre-compiled, no go build runs in container. Ref: CAS-472"

  - vulnerability: "CVE-2023-29405"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "cgo build-time attack; gosu is pre-compiled, no go build runs in container. Ref: CAS-472"

  # CVE-2024-24790: net/netip IPv4-mapped address behaviour.
  # Redis manages networking at the protocol level; stdlib path not reachable.
  - vulnerability: "CVE-2024-24790"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "net/netip IPv4-mapped behaviour; not reachable via Redis command surface. Waiting on Alpine redis rebuild with Go 1.24+. Ref: CAS-472"

  # CVE-2025-22871: net/http bare LF as chunk-size line terminator.
  # gosu does not expose an HTTP server.
  - vulnerability: "CVE-2025-22871"
    package:
      name: "stdlib"
      version: "go1.18.2"
      type: "go-module"
    reason: "net/http LF handling; gosu exposes no HTTP surface. Waiting on Alpine redis rebuild with Go 1.24+. Ref: CAS-472"

  # ── golang:1.22-alpine — Go stdlib CVEs in Go 1.22 toolchain (CAS-472) ──────
  #
  # golang:1.22-alpine ships the full Go 1.22 toolchain (~20 binaries under
  # /usr/local/go/).  Two Critical CVEs affect these binaries:
  #   - CVE-2025-68121: crypto/tls session resumption cert validation.
  #     Fixed in Go 1.24.13+; no backport to 1.22.  These are CI BUILD TOOLS,
  #     not TLS servers; the attack surface requires an active TLS client.
  #   - CVE-2025-22871: net/http bare LF as chunk-size line terminator.
  #     Fixed in Go 1.23.8+ / 1.24.2+.  Toolchain binaries do not serve HTTP.
  #
  # Each CVE creates matches per toolchain binary (~20 binaries) and also
  # one match for the top-level "go" package (the toolchain metadata entry).
  # Grype reports two distinct package names: "stdlib" (per binary) and "go"
  # (the parent toolchain entry).  Both entries must be suppressed.
  # Fix: upgrade to golang:1.24-alpine (tracked as follow-up in CAS-473).
  # Ref: CAS-472.
  - vulnerability: "CVE-2025-68121"
    package:
      name: "stdlib"
      type: "go-module"
    reason: "Go 1.22 toolchain build tools, not TLS servers. Fix requires upgrade to golang:1.24-alpine. Ref: CAS-472"

  - vulnerability: "CVE-2025-68121"
    package:
      name: "go"
      type: "go-module"
    reason: "Go 1.22 toolchain metadata entry, not a TLS server. Fix requires upgrade to golang:1.24-alpine. Ref: CAS-472"

  - vulnerability: "CVE-2025-22871"
    package:
      name: "stdlib"
      type: "go-module"
    reason: "Go 1.22 toolchain build tools, no HTTP server surface. Fix requires upgrade to golang:1.24-alpine. Ref: CAS-472"

  - vulnerability: "CVE-2025-22871"
    package:
      name: "go"
      type: "go-module"
    reason: "Go 1.22 toolchain metadata entry, no HTTP server surface. Fix requires upgrade to golang:1.24-alpine. Ref: CAS-472"

  # ── mysql:8.4 — upstream dependency exceptions (CAS-472) ────────────────────
  #
  # CVE-2025-68121: crypto/tls incorrect certificate validation during TLS
  # session resumption in Go stdlib go1.24.6.  Affects the `gosu` binary
  # bundled by the upstream mysql:8.4 image to drop privileges at startup.
  # gosu does not perform TLS connections in production; this is a privilege-
  # dropping shim only.  Fix requires upstream mysql to ship a new gosu compiled
  # with Go ≥ 1.24.13.  Accepted risk pending upstream update.  Ref: CAS-472.
  - vulnerability: "CVE-2025-68121"
    package:
      name: "stdlib"
      type: "go-module"
      location: "/usr/local/bin/gosu"
    reason: "gosu privilege-drop shim; no production TLS usage. Fix requires upstream image update. Ref: CAS-472"

  # CVE-2026-27459: PyOpenSSL 25.1.0 critical vulnerability in the MySQL Shell
  # (mysqlsh) Python environment bundled by upstream mysql:8.4.  mysqlsh is an
  # administrative/DBA CLI tool, not a production service exposed in container
  # workloads.  Fix version (pyopenssl ≥ 26.0.0) requires modifying the upstream
  # mysqlsh package.  Accepted risk pending upstream mysql:8.4 image update.
  # Ref: CAS-472.
  # pyopenssl is only present in the mysql:8.4 image via the mysqlsh package.
  - vulnerability: "CVE-2026-27459"
    package:
      name: "pyopenssl"
      type: "python"
    reason: "mysqlsh admin tool, not exposed in production service. Fix requires upstream mysql:8.4 update. Ref: CAS-472"

# External sources for enriched vulnerability data
external-sources:
  enable: true
  maven:
    search-upstream-by-sha1: true
    base-url: "https://search.maven.org/solrsearch/select"
