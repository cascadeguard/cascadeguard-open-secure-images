# CascadeGuard — Enforce Actions Policy (Thin Wrapper)
#
# Delegates to the reusable workflow in cascadeguard-actions.

name: Enforce Actions Policy

on:
  workflow_call:
    inputs:
      policy_path:
        description: "Path to the actions-policy.yaml file"
        required: false
        default: ".cascadeguard/actions-policy.yaml"
        type: string
      workflows_dir:
        description: "Path to the directory containing workflow files to audit"
        required: false
        default: ".github/workflows"
        type: string
      cascadeguard_version:
        description: "cascadeguard CLI git ref to install (e.g. 'main' or a tag)"
        required: false
        default: "main"
        type: string

jobs:
  audit:
    uses: cascadeguard/cascadeguard-actions/.github/workflows/enforce-actions-policy.yaml@510b0009b78df3114345cb907db6b026da79d7ab # main
    with:
      policy_path: ${{ inputs.policy_path }}
      workflows_dir: ${{ inputs.workflows_dir }}
      cascadeguard_version: ${{ inputs.cascadeguard_version }}
