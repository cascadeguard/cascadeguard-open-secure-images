# CascadeGuard — Build Workflow (Thin Wrapper)
#
# Delegates the full build pipeline to the reusable workflow in
# cascadeguard-actions. Runs on push to main (when image-related files
# change) and on manual dispatch. PR validation is handled separately
# by pr-check.yaml — we do NOT build every image on PRs.

name: Build

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "shared/**"
      - "images.yaml"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      image_filter:
        description: "Limit to a specific image name. Leave empty for all."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  build:
    uses: cascadeguard/cascadeguard-actions/.github/workflows/build.yaml@main
    with:
      image_filter: ${{ github.event.inputs.image_filter || '' }}
    secrets: inherit
