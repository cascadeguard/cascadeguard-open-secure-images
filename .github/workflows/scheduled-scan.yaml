# CascadeGuard — Scheduled Vulnerability Scan
#
# Runs daily to scan all published images for newly disclosed CVEs.
# The image matrix is generated at runtime from images.yaml — no hardcoded
# image list. Adding an image to images.yaml automatically enrolls it here.
#
# Scan processing (reports + per-CVE issues) is delegated to composite
# actions from cascadeguard/cascadeguard-actions, which handle CLI
# installation internally.

name: Scheduled Vulnerability Scan

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  issues: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate scan matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          active = [img for img in images if img.get('enabled', True) is not False]
          include = [{
              'name': img['image'],
              'tag': img['tag'],
              'dir': '/'.join(img['dockerfile'].split('/')[:-1]),
          } for img in active]

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Scan matrix: {include}')
          PYEOF

  # ── Per-Image Scan (read-only) ───────────────────────────────────
  scan:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          docker pull "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}" || {
            echo "::warning::Image ${{ matrix.name }}:${{ matrix.tag }} not found in registry. Skipping."
            exit 0
          }

      # ── Grype Scan ──────────────────────────────────────────────
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan with Grype
        id: grype
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}"
          grype "$IMAGE" \
            --config shared/scanning/grype-config.yaml \
            --output json \
            --file grype-results.json || true

          grype "$IMAGE" \
            --config shared/scanning/grype-config.yaml \
            --output sarif \
            --file grype-results.sarif || true

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype-results.sarif
        continue-on-error: true

      # ── Trivy Scan (secondary scanner) ──────────────────────────
      - name: Install Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      # ── Generate diffable report ────────────────────────────────
      - name: Generate vulnerability report
        id: report
        uses: cascadeguard/cascadeguard-actions/scan-report@5cec3323e5d6992f1b3a44516d75c09ceee10db8
        with:
          grype-results: grype-results.json
          trivy-results: trivy-results.json
          image: ${{ matrix.name }}:${{ matrix.tag }}
          output-dir: images/${{ matrix.name }}/reports

      # ── Commit report to repo ───────────────────────────────────
      - name: Commit vulnerability report
        run: |
          git config user.name "cascadeguard-bot"
          git config user.email "bot@cascadeguard.dev"
          git add "images/${{ matrix.name }}/reports/"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update vulnerability report for ${{ matrix.name }}"
            git push
          fi

      # ── Create/update per-CVE GitHub issues ─────────────────────
      - name: Create or update CVE issues
        if: steps.report.outputs.critical-count > 0 || steps.report.outputs.high-count > 0
        uses: cascadeguard/cascadeguard-actions/scan-issues@5cec3323e5d6992f1b3a44516d75c09ceee10db8
        with:
          grype-results: grype-results.json
          trivy-results: trivy-results.json
          image: ${{ matrix.name }}
          tag: ${{ matrix.tag }}
          repo: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: scan-results-${{ matrix.name }}
          path: |
            ${{ matrix.dir }}/reports/
            grype-results.json
            trivy-results.json
          retention-days: 30

  # ── Collect & Commit All Reports (single write) ──────────────────
  collect-reports:
    needs: [scan]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all scan artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79d8d6f6433c7a32 # v4
        with:
          pattern: scan-results-*
          merge-multiple: false
          path: artifacts/

      - name: Copy reports into repo tree
        run: |
          # Each artifact is in artifacts/scan-results-<name>/
          # The grype-report.json and trivy-report.json are nested under the image dir
          # We need to copy them back to their report directories

          shopt -s nullglob globstar
          copied=0

          for artifact_dir in artifacts/scan-results-*/; do
            # Find report files (grype-report.json, trivy-report.json) inside nested dirs
            while IFS= read -r -d '' report_file; do
              # Reconstruct relative path from within artifact dir
              rel="${report_file#"$artifact_dir"}"
              # Only handle files inside a reports/ subdirectory
              if [[ "$rel" == */reports/* ]]; then
                dest="$rel"
                mkdir -p "$(dirname "$dest")"
                cp "$report_file" "$dest"
                echo "Copied: $dest"
                ((copied++)) || true
              fi
            done < <(find "$artifact_dir" -type f \( -name "grype-report.json" -o -name "trivy-report.json" \) -print0)
          done

          echo "Total report files staged: $copied"

      - name: Commit and push all reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*/reports/"
          if git diff --cached --quiet; then
            echo "No changes to vulnerability reports. Skipping commit."
          else
            SCAN_DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(reports): update vulnerability reports ${SCAN_DATE}

          Automated scan results from ${SCAN_DATE}. Reports collected from
          all parallel matrix jobs and committed in a single push.

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push origin main
          fi
