# CascadeGuard — Scheduled Vulnerability Scan
#
# Runs daily to scan all published images for newly disclosed CVEs.
# The image matrix is generated at runtime from images.yaml — no hardcoded
# image list. Adding an image to images.yaml automatically enrolls it here.
#
# Issues are created per CVE+package (not per image). Affected images are
# tracked via labels. Reports are committed alongside each image's Dockerfile.

name: Scheduled Vulnerability Scan

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  issues: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate scan matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          active = [img for img in images if img.get('enabled', True) is not False]
          include = [{
              'name': img['image'],
              'tag': img['tag'],
              'dir': '/'.join(img['dockerfile'].split('/')[:-1]),
          } for img in active]

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Scan matrix: {include}')
          PYEOF

  # ── Per-Image Scan ───────────────────────────────────────────────
  scan:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          docker pull "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}" || {
            echo "::warning::Image ${{ matrix.name }}:${{ matrix.tag }} not found in registry. Skipping."
            exit 0
          }

      # ── Grype Scan ──────────────────────────────────────────────
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan with Grype
        id: grype
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}"
          grype "$IMAGE" \
            --config shared/scanning/grype-config.yaml \
            --output json \
            --file grype-results.json || true

          grype "$IMAGE" \
            --config shared/scanning/grype-config.yaml \
            --output sarif \
            --file grype-results.sarif || true

          # Extract counts
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity == "Medium")] | length' grype-results.json 2>/dev/null || echo 0)
          TOTAL=$(jq '.matches | length' grype-results.json 2>/dev/null || echo 0)

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype-results.sarif
        continue-on-error: true

      # ── Trivy Scan (secondary scanner) ──────────────────────────
      - name: Install Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: "${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      # ── Commit reports to git ───────────────────────────────────
      - name: Commit vulnerability reports
        run: |
          REPORT_DIR="${{ matrix.dir }}/reports"
          mkdir -p "$REPORT_DIR"

          # Build a stable, diffable summary from Grype JSON
          if [ -f grype-results.json ]; then
            jq -S '{
              image: "${{ matrix.name }}:${{ matrix.tag }}",
              scan_date: (now | strftime("%Y-%m-%d")),
              scanner: "grype",
              summary: {
                critical: [.matches[] | select(.vulnerability.severity == "Critical")] | length,
                high: [.matches[] | select(.vulnerability.severity == "High")] | length,
                medium: [.matches[] | select(.vulnerability.severity == "Medium")] | length,
                total: .matches | length
              },
              vulnerabilities: [.matches[] | select(.vulnerability.severity == "Critical" or .vulnerability.severity == "High") | {
                id: .vulnerability.id,
                severity: .vulnerability.severity,
                package: .artifact.name,
                installed: .artifact.version,
                fixed: (.vulnerability.fix.versions // [] | join(", ")),
                description: .vulnerability.description
              }] | sort_by(.severity, .id)
            }' grype-results.json > "$REPORT_DIR/grype-report.json" 2>/dev/null || true
          fi

          if [ -f trivy-results.json ]; then
            cp trivy-results.json "$REPORT_DIR/trivy-report.json" 2>/dev/null || true
          fi

          # Only commit if the reports actually changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_DIR/"
          if git diff --cached --quiet; then
            echo "No changes to vulnerability reports for ${{ matrix.name }}. Skipping commit."
          else
            git commit -m "chore(reports): update vulnerability report for ${{ matrix.name }}

          Automated scan results from $(date -u +%Y-%m-%d).

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push origin main
          fi

      # ── Per-CVE GitHub Issues ───────────────────────────────────
      - name: Create or update per-CVE issues
        if: steps.grype.outputs.critical > 0 || steps.grype.outputs.high > 0
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const imageName = '${{ matrix.name }}';
            const imageTag = '${{ matrix.tag }}';
            const imageLabel = `image:${imageName}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            // Parse Grype results
            let grypeMatches = [];
            try {
              const raw = fs.readFileSync('grype-results.json', 'utf8');
              const grype = JSON.parse(raw);
              grypeMatches = grype.matches || [];
            } catch (e) {
              console.log('Could not parse grype-results.json:', e.message);
            }

            // Filter to critical + high only
            const cves = grypeMatches
              .filter(m => m.vulnerability.severity === 'Critical' || m.vulnerability.severity === 'High')
              .map(m => ({
                id: m.vulnerability.id,
                severity: m.vulnerability.severity,
                pkg: m.artifact.name,
                installed: m.artifact.version,
                fixed: (m.vulnerability.fix?.versions || []).join(', ') || 'none',
              }));

            // De-dup by CVE+package
            const seen = new Set();
            const unique = cves.filter(c => {
              const key = `${c.id}:${c.pkg}`;
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            if (unique.length === 0) {
              console.log('No critical/high CVEs to report.');
              return;
            }

            // Ensure labels exist
            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description });
              }
            };

            await ensureLabel('cve', 'd73a4a', 'CVE vulnerability finding');
            await ensureLabel('security', 'e11d48', 'Security-related');
            await ensureLabel('severity:critical', 'b60205', 'Critical severity');
            await ensureLabel('severity:high', 'ff9f1c', 'High severity');
            await ensureLabel(imageLabel, '0075ca', `Affects ${imageName} image`);

            // Fetch all open CVE issues once
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'cve',
              per_page: 100,
            });

            // Step summary table
            let summary = `## Scan Results: ${imageName}:${imageTag} (${today})\n\n`;
            summary += '| CVE | Severity | Package | Installed | Fix | Issue |\n';
            summary += '|-----|----------|---------|-----------|-----|-------|\n';

            for (const cve of unique) {
              const titlePrefix = `${cve.id}: ${cve.pkg}`;
              const sevLower = cve.severity.toLowerCase();
              const sevLabel = `severity:${sevLower}`;

              // Match existing issue by CVE+package prefix in title
              const existing = openIssues.find(i =>
                i.title.startsWith(titlePrefix) && i.labels.some(l => l.name === 'cve')
              );

              if (existing) {
                // Add image label if not already present
                const hasImageLabel = existing.labels.some(l => l.name === imageLabel);
                if (!hasImageLabel) {
                  const currentLabels = existing.labels.map(l => l.name);
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    labels: [...currentLabels, imageLabel],
                  });
                }

                // Reopen if previously closed
                if (existing.state === 'closed') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    state: 'open',
                  });
                }

                // Add scan-update comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    `### Re-scan: ${imageName}:${imageTag} — ${today}`,
                    '',
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| Image | \`${imageName}:${imageTag}\` |`,
                    `| Installed | \`${cve.installed}\` |`,
                    `| Fix available | ${cve.fixed} |`,
                    `| Scan run | [${context.runId}](${runUrl}) |`,
                  ].join('\n'),
                });

                summary += `| ${cve.id} | ${cve.severity} | ${cve.pkg} | ${cve.installed} | ${cve.fixed} | #${existing.number} (updated) |\n`;
                console.log(`Updated existing issue #${existing.number} for ${cve.id}:${cve.pkg}`);
              } else {
                // Create new issue
                const sla = cve.severity === 'Critical' ? '24 hours' : '48 hours';
                const body = [
                  `## ${cve.id}: ${cve.pkg} (${sevLower})`,
                  '',
                  `| Field | Value |`,
                  `|-------|-------|`,
                  `| CVE | ${cve.id} |`,
                  `| Severity | ${cve.severity} |`,
                  `| Package | \`${cve.pkg}\` |`,
                  `| Installed version | \`${cve.installed}\` |`,
                  `| Fix available | ${cve.fixed} |`,
                  `| First detected | ${today} |`,
                  `| SLA | Patch within **${sla}** |`,
                  `| Scan run | [${context.runId}](${runUrl}) |`,
                  '',
                  `### Affected images`,
                  `- \`${imageName}:${imageTag}\``,
                  '',
                  '---',
                  '*Automatically created by CascadeGuard scheduled scan.*',
                ].join('\n');

                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `${titlePrefix} (${sevLower})`,
                  body,
                  labels: ['cve', 'security', sevLabel, imageLabel],
                });

                summary += `| ${cve.id} | ${cve.severity} | ${cve.pkg} | ${cve.installed} | ${cve.fixed} | #${newIssue.data.number} (new) |\n`;
                console.log(`Created issue #${newIssue.data.number} for ${cve.id}:${cve.pkg}`);
              }
            }

            // Post step summary
            await core.summary.addRaw(summary).write();

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: scan-results-${{ matrix.name }}
          path: |
            grype-results.json
            trivy-results.json
          retention-days: 30
