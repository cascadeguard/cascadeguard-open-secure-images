# CascadeGuard — Release Workflow
#
# Triggered on version tags (v*). Builds all images, signs them,
# and pushes to both GitHub Container Registry and Docker Hub.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  attestations: write    # Required for SLSA provenance attestation

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_PREFIX_GHCR: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX_DOCKERHUB: ${{ github.repository_owner }}

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate release matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          include = []
          for img in images:
              # Derive context dir from dockerfile: "images/python/3.12/Dockerfile" -> "images/python/3.12"
              context = '/'.join(img['dockerfile'].split('/')[:-1])
              include.append({
                  'context': context,
                  'name': img['image'],
                  'tag': img['tag'],
              })

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Release matrix: {[e["name"] for e in include]}')
          PYEOF

  release:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      # ── Registry Authentication ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Prepare Build Context ────────────────────────────────────
      - name: Extract release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Copy shared scripts into build context
        run: cp -r shared ${{ matrix.context }}/shared

      # ── Build Multi-Platform Images ─────────────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scan ────────────────────────────────────────────────────
      - name: Install Grype
        uses: cascadeguard/cascadeguard-actions/setup-grype@7e39ae312b916fb978e8b5f51aab113ae1aebca0 # CAS-94
        with:
          version: v0.110.0

      - name: Scan released image
        run: |
          grype "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}" \
            --config shared/scanning/grype-config.yaml \
            --fail-on critical

      # ── SBOM ────────────────────────────────────────────────────
      - name: Install Syft
        uses: cascadeguard/cascadeguard-actions/setup-syft@7e39ae312b916fb978e8b5f51aab113ae1aebca0 # CAS-94
        with:
          version: v1.42.3

      - name: Generate SBOM
        run: |
          syft "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}" \
            --output spdx-json=sbom-${{ matrix.name }}.spdx.json \
            --output cyclonedx-json=sbom-${{ matrix.name }}.cyclonedx.json

      # ── Sign ────────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image and attach SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign on GHCR
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Attach SBOM attestation on GHCR
          cosign attest --yes \
            --predicate sbom-${{ matrix.name }}.spdx.json \
            --type spdxjson \
            "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Attach SBOM as OCI artifact on GHCR (discoverable via cosign download sbom)
          cosign attach sbom \
            --sbom sbom-${{ matrix.name }}.spdx.json \
            --type spdx \
            "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Sign on Docker Hub
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ matrix.tag }}"

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom-release-${{ matrix.name }}
          path: |
            sbom-${{ matrix.name }}.spdx.json
            sbom-${{ matrix.name }}.cyclonedx.json

      - name: Clean up build context
        if: always()
        run: rm -rf ${{ matrix.context }}/shared

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-release-*
          path: sboms/
          merge-multiple: true

      - name: Build release body from images.yaml
        id: release-body
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          owner = os.environ['REPO_OWNER']
          ref_name = os.environ['REF_NAME']
          repo = os.environ['REPO']

          rows = []
          first_image = None
          for img in images:
              name = img['image']
              tag = img['tag']
              if first_image is None:
                  first_image = f'{name}:{tag}'
              rows.append(
                  f'| {name}:{tag} | `ghcr.io/{owner}/{name}:{tag}` | `{owner}/{name}:{tag}` |'
              )

          lines = [
              f'## CascadeGuard Secure Base Images {ref_name}',
              '',
              '### Images published',
              '| Image | GHCR | Docker Hub |',
              '|-------|------|------------|',
              '\n'.join(rows),
              '',
              '### Security',
              '- All images scanned with Grype (zero critical/high CVEs at release time)',
              '- Signed with cosign (keyless / Sigstore / Rekor transparency log)',
              '- SBOM attestations attached (SPDX + CycloneDX JSON)',
              '- SLSA Level 3 provenance attestations generated by GitHub Actions',
              '',
              '### Verify',
              '```bash',
              '# Verify cosign signature',
              f'cosign verify \\',
              f'  --certificate-identity-regexp "https://github.com/{repo}/.*" \\',
              f'  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\',
              f'  ghcr.io/{owner}/{first_image}',
              '',
              '# Verify SLSA provenance',
              f'gh attestation verify oci://ghcr.io/{owner}/{first_image} --owner {owner.split("/")[0]}',
              '```',
          ]

          with open('release-body.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Release body generated.')
          PYEOF
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: |
            sboms/*.spdx.json
            sboms/*.cyclonedx.json
          body_path: release-body.md
