# CascadeGuard — Release Workflow
#
# Triggered on version tags (v*). Builds all images, signs them,
# and pushes to both GitHub Container Registry and Docker Hub.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_PREFIX_GHCR: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX_DOCKERHUB: ${{ github.repository_owner }}

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate release matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          include = []
          for img in images:
              # Derive context dir from dockerfile: "images/python/3.12/Dockerfile" -> "images/python/3.12"
              context = '/'.join(img['dockerfile'].split('/')[:-1])
              include.append({
                  'context': context,
                  'name': img['image'],
                  'tag': img['tag'],
              })

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Release matrix: {[e["name"] for e in include]}')
          PYEOF

  release:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v4

      # ── Registry Authentication ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Prepare Build Context ────────────────────────────────────
      - name: Extract release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Copy shared scripts into build context
        run: cp -r shared ${{ matrix.context }}/shared

      # ── Build Multi-Platform Images ─────────────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scan ────────────────────────────────────────────────────
      - name: Install Grype
        # anchore/setup-grype does not exist as a public repo; install directly
        # from a pinned release tag to avoid supply-chain risk.
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/v0.110.0/install.sh | sh -s -- -b /usr/local/bin v0.110.0

      - name: Scan released image
        run: |
          grype "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}" \
            --config shared/scanning/grype-config.yaml \
            --fail-on critical

      # ── SBOM ────────────────────────────────────────────────────
      - name: Install Syft
        # anchore/setup-syft does not exist as a public repo; install directly
        # from a pinned release tag to avoid supply-chain risk.
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/v1.42.3/install.sh | sh -s -- -b /usr/local/bin v1.42.3

      - name: Generate SBOM
        run: |
          syft "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}" \
            --output spdx-json=sbom-${{ matrix.name }}.spdx.json

      # ── Sign ────────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image and attach SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign on GHCR
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Attach SBOM attestation on GHCR
          cosign attest --yes \
            --predicate sbom-${{ matrix.name }}.spdx.json \
            --type spdxjson \
            "${{ env.IMAGE_PREFIX_GHCR }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Sign on Docker Hub
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ env.IMAGE_PREFIX_DOCKERHUB }}/${{ matrix.name }}:${{ matrix.tag }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-release-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json

      - name: Clean up build context
        if: always()
        run: rm -rf ${{ matrix.context }}/shared

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all SBOM artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sbom-release-*
          path: sboms/
          merge-multiple: true

      - name: Build release body from images.yaml
        id: release-body
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          owner = os.environ['REPO_OWNER']
          ref_name = os.environ['REF_NAME']
          repo = os.environ['REPO']

          rows = []
          first_image = None
          for img in images:
              name = img['image']
              tag = img['tag']
              if first_image is None:
                  first_image = f'{name}:{tag}'
              rows.append(
                  f'| {name}:{tag} | `ghcr.io/{owner}/{name}:{tag}` | `{owner}/{name}:{tag}` |'
              )

          lines = [
              f'## CascadeGuard Secure Base Images {ref_name}',
              '',
              '### Images published',
              '| Image | GHCR | Docker Hub |',
              '|-------|------|------------|',
              '\n'.join(rows),
              '',
              '### Security',
              '- All images scanned with Grype (zero critical/high CVEs at release time)',
              '- Signed with cosign (keyless / Sigstore)',
              '- SBOM attestations attached (SPDX JSON)',
              '',
              '### Verify',
              '```bash',
              f'cosign verify \\',
              f'  --certificate-identity-regexp "https://github.com/{repo}/.*" \\',
              f'  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\',
              f'  ghcr.io/{owner}/{first_image}',
              '```',
          ]

          with open('release-body.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Release body generated.')
          PYEOF
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: sboms/*.spdx.json
          body_path: release-body.md
