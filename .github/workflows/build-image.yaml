# CascadeGuard — Build, Scan, Test, Sign, and Push Hardened Images
#
# Reusable workflow called by ci.yaml for each image in images.yaml.
# All pipeline inputs come from the caller — no hardcoded image references here.

name: Build Image

on:
  workflow_call:
    inputs:
      image_path:
        description: "Path under images/ (e.g., python/3.12)"
        required: true
        type: string
      image_name:
        description: "Image name in registry (e.g., python)"
        required: true
        type: string
      image_tag:
        description: "Image tag (e.g., 3.12-slim)"
        required: true
        type: string
      push_and_sign:
        description: "Whether to push and sign the image (false on PRs)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write        # Required for cosign keyless signing via OIDC
  security-events: write # Required for SARIF upload

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: inputs.push_and_sign
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set full image reference
        id: meta
        run: |
          FULL_IMAGE="${{ env.IMAGE_PREFIX }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Copy shared hardening scripts into build context
        run: cp -r shared images/${{ inputs.image_path }}/shared

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ inputs.image_path }}
          file: images/${{ inputs.image_path }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scanning ─────────────────────────────────────────────────
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # Run Grype once and write both SARIF (for GitHub Security tab) and JSON
      # (for policy evaluation). We do NOT pass --fail-on here — the policy gate
      # comes later so that structure tests and SBOM generation always complete.
      - name: Scan image with Grype
        run: |
          grype "${{ steps.meta.outputs.full_image }}" \
            --config shared/scanning/grype-config.yaml \
            --output sarif=grype-results.sarif \
            --output json=grype-results.json

      - name: Upload Grype SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      # ── Structure Tests ──────────────────────────────────────────
      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image "${{ steps.meta.outputs.full_image }}" \
            --config images/${{ inputs.image_path }}/test/structure.yaml

      # ── SBOM Generation ──────────────────────────────────────────
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft "${{ steps.meta.outputs.full_image }}" \
            --output spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ inputs.image_name }}-${{ inputs.image_tag }}
          path: sbom.spdx.json

      # ── CVE Policy Gate ──────────────────────────────────────────
      # Evaluated after structure tests and SBOM so those artifacts are always
      # collected even when a policy violation is found.
      # Blocks on critical CVEs. High CVEs from upstream bases emit a warning.
      - name: Evaluate CVE policy
        run: |
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::CVE policy violation: $CRITICAL critical vulnerabilities found"
            exit 1
          fi
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::$HIGH high vulnerabilities found in upstream base image"
          fi
          echo "CVE policy check passed."

      # ── Sign & Push ──────────────────────────────────────────────
      - name: Install Cosign
        if: inputs.push_and_sign
        uses: sigstore/cosign-installer@v3

      - name: Push image
        if: inputs.push_and_sign
        run: docker push "${{ steps.meta.outputs.full_image }}"

      - name: Sign image and attach SBOM attestation
        if: inputs.push_and_sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.meta.outputs.full_image }}"

          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.meta.outputs.full_image }}"

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Clean up build context
        if: always()
        run: rm -rf images/${{ inputs.image_path }}/shared
