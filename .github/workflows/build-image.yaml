# CascadeGuard — Build, Scan, Test, Sign, and Push Hardened Images
#
# Reusable workflow with a matrix strategy covering all images.
# Triggered on pushes to main and pull requests.

name: Build Image

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "shared/**"
      - ".github/workflows/build-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - "shared/**"
  workflow_dispatch:
    inputs:
      image:
        description: "Specific image to build (e.g., python/3.12). Leave empty for all."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write       # Required for cosign keyless signing via OIDC
  security-events: write # Required for SARIF upload

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine image matrix
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.image }}" ]; then
            # Manual trigger for a specific image
            echo 'matrix={"image":["${{ github.event.inputs.image }}"]}' >> "$GITHUB_OUTPUT"
          else
            # Build all images
            IMAGES=$(find images -name Dockerfile -exec dirname {} \; \
              | sed 's|^images/||' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "matrix={\"image\":$IMAGES}" >> "$GITHUB_OUTPUT"
          fi

  # Validate images.yaml with CascadeGuard — dogfooding our own tool.
  # Lints the config and performs a dry-run state generation to catch
  # misconfigured Dockerfiles before the build matrix starts.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CascadeGuard validate
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/cascadeguard/cascadeguard:v0.1.0 \
            validate \
          || echo "::warning::CascadeGuard validate exited non-zero — review images.yaml or check CascadeGuard version compatibility"

  build:
    needs: [detect-changes, validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          IMAGE_NAME=$(jq -r --arg key "${{ matrix.image }}" '.[$key].name' .image-meta.json)
          IMAGE_TAG=$(jq -r --arg key "${{ matrix.image }}" '.[$key].tag' .image-meta.json)
          FULL_IMAGE="${{ env.IMAGE_PREFIX }}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Copy shared hardening scripts into build context
        run: |
          cp -r shared images/${{ matrix.image }}/shared

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scanning ─────────────────────────────────────────────────
      # Install Grype using the dedicated setup action (replaces scan-action/setup)
      - name: Install Grype
        uses: anchore/setup-grype@v1

      # Run Grype once and write both SARIF (for GitHub Security tab) and JSON
      # (for policy evaluation).  We do NOT pass --fail-on here — the policy gate
      # comes later so that structure tests and SBOM generation always complete.
      - name: Scan image with Grype
        run: |
          grype "${{ steps.meta.outputs.full_image }}" \
            --config shared/scanning/grype-config.yaml \
            --output sarif=grype-results.sarif \
            --output json=grype-results.json

      - name: Upload Grype SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      # ── Structure Tests ──────────────────────────────────────────
      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image "${{ steps.meta.outputs.full_image }}" \
            --config images/${{ matrix.image }}/test/structure.yaml

      # ── SBOM Generation ──────────────────────────────────────────
      # Install Syft using the dedicated setup action (replaces sbom-action/setup)
      - name: Install Syft
        uses: anchore/setup-syft@v2

      - name: Generate SBOM
        run: |
          syft "${{ steps.meta.outputs.full_image }}" \
            --output spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.image_name }}
          path: sbom.spdx.json

      # ── CVE Policy Gate ─────────────────────────────────────────
      # Evaluated after structure tests and SBOM so those artifacts are always
      # collected even when a policy violation is found.
      - name: Evaluate CVE policy
        run: |
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::CVE policy violation: $CRITICAL critical, $HIGH high vulnerabilities found"
            exit 1
          fi
          echo "CVE policy check passed."

      # ── Sign & Push ─────────────────────────────────────────────
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.meta.outputs.full_image }}"

      - name: Sign image and attach SBOM
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Get the image digest after push
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.full_image }}" 2>/dev/null || \
            docker inspect --format='{{.Id}}' "${{ steps.meta.outputs.full_image }}")

          cosign sign --yes "${{ steps.meta.outputs.full_image }}"

          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.meta.outputs.full_image }}"

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Clean up build context
        if: always()
        run: |
          rm -rf images/${{ matrix.image }}/shared
