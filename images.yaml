# CascadeGuard enrolment file for cascadeguard-open-secure-images
#
# Single source of truth for images managed by CascadeGuard.
# Catalog metadata (tier, pull_count, category, etc.) lives in the
# CascadeGuard app database, not here.
#
# Repo-level defaults (registry, local.dir) are in .cascadeguard.yaml.

# ── Managed images ────────────────────────────────────────────────────────────

- name: nginx
  dockerfile: images/nginx/Dockerfile
  image: nginx
  tag: stable-alpine-slim

- name: alpine
  dockerfile: images/alpine/Dockerfile
  image: alpine
  tag: "3.20"

- name: ubuntu
  dockerfile: images/ubuntu/Dockerfile
  image: ubuntu
  tag: "22.04"

- name: python
  dockerfile: images/python/3.12/Dockerfile
  image: python
  tag: 3.12-slim

- name: postgres
  dockerfile: images/postgres/16/Dockerfile
  image: postgres
  tag: "16"

- name: redis
  dockerfile: images/redis/7/Dockerfile
  image: redis
  tag: 7.4-alpine

- name: node
  dockerfile: images/node/20/Dockerfile
  image: node
  tag: 20-slim

- name: mysql
  dockerfile: images/mysql/8/Dockerfile
  image: mysql
  tag: "8.0"

- name: golang
  dockerfile: images/golang/1.22/Dockerfile
  image: golang
  tag: 1.22-alpine

- name: openjdk
  dockerfile: images/openjdk/21/Dockerfile
  image: openjdk
  tag: 21-slim

# ── Upstream tracked (monitoring only) ────────────────────────────────────────

- name: memcached
  enabled: false

- name: httpd
  enabled: false

- name: mongo
  enabled: false

- name: rabbitmq
  enabled: false

- name: traefik
  enabled: false

- name: mariadb
  enabled: false

- name: grafana
  enabled: false

- name: php
  enabled: false

- name: ruby
  enabled: false

- name: prometheus
  enabled: false

- name: elasticsearch
  enabled: false

- name: haproxy
  enabled: false

- name: tomcat
  enabled: false

- name: consul
  enabled: false

- name: vault
  enabled: false
