# CascadeGuard enrolment file for cascadeguard-open-secure-images
#
# Single source of truth for all 25 images tracked by CascadeGuard.
# Consolidates Dockerfile/CI config (CAS-135) and catalog metadata (CAS-134).
#
# Managed (enabled: true, default): CascadeGuard publishes a hardened,
# signed build to ghcr.io/cascadeguard. CI + state resources are generated.
#
# Upstream tracked (enabled: false): CVE posture is monitored and surfaced
# in the dashboard, but no hardened build is published. No CI/state generated.
#
# Dashboard fields (pull_count, star_count, category, etc.) are stored here
# until the D1 database migration is complete (CAS-113).
#
# Schema follows cascadeguard-exemplar conventions:
#   https://github.com/cascadeguard/cascadeguard-exemplar/blob/main/images.yaml

# ── Managed (10) ──────────────────────────────────────────────────────────────

